<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية الباحث | Researcher Academy</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #050a14; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .moving-line-thick { height: 6px; background: linear-gradient(90deg, #2563eb, #f97316, #2563eb); background-size: 200% auto; animation: gradientMove 2s linear infinite; }
        
        .grad-text {
            background: linear-gradient(90deg, #2563eb, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-brand-dark { background-color: #050a14; color: white; }

        @keyframes dropIn { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .loader-dot { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(to bottom, #2563eb, #f97316); animation: dropIn 0.5s ease-out forwards; }
        
        @keyframes logoIntro { 
            0% { transform: translateY(-100vh) scale(0.5); filter: blur(15px); opacity: 0; }
            30% { transform: translateY(0) scale(1); filter: blur(0px); opacity: 1; }
            70% { transform: translateY(0) scale(1.1); filter: blur(5px); opacity: 1; }
            100% { transform: translateY(100vh) scale(0.8); filter: blur(15px); opacity: 0; }
        }
        .logo-animate { animation: logoIntro 5s ease-in-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BOT_TOKEN = "8059026799:AAHJYZej9ecO4GJ3PAGbtXI3EXKt9wStM_4";
        const CHAT_ID = "6068331455";

        function AcademyApp() {
            const [stage, setStage] = useState('loader'); 
            const [view, setView] = useState('main'); 
            const [selectedSubject, setSelectedSubject] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            const [targetDept, setTargetDept] = useState('');
            const [student, setStudent] = useState({ name: '', level: '', pass: '' });

            // 1. إدارة مراحل التحميل (إصلاح اختفاء الشاشة)
            useEffect(() => {
                const timer1 = setTimeout(() => setStage('logo'), 2000);
                const timer2 = setTimeout(() => setStage('home'), 7000);

                // إشعار العودة التلقائي
                const authStatus = localStorage.getItem('isAuth');
                if (authStatus === 'true') {
                    const name = localStorage.getItem('studentName');
                    const level = localStorage.getItem('studentLevel');
                    sendTelegram(`🔄 **الطالب عاد للمنصة:**\n👤 ${name}\n🎓 ${level}`);
                }

                return () => { clearTimeout(timer1); clearTimeout(timer2); };
            }, []);

            const sendTelegram = async (msg) => {
                try {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                } catch(e) { console.error("Telegram Error"); }
            };

            const handleEnter = (dept) => {
                setTargetDept(dept);
                setShowLogin(true);
            };

            const validCodes = Array.from({ length: 100 }, (_, i) => `gv${i + 1}`);

            const finalizeLogin = async () => {
                const sName = student.name?.trim();
                const sLevel = student.level;
                const sPass = student.pass?.trim().toLowerCase();

                if (!sName || !sLevel || !sPass) {
                    alert("⚠️ يرجى إكمال جميع البيانات أولاً!");
                    return;
                }

                if (!validCodes.includes(sPass)) {
                    alert("⚠️ كود الاشتراك غير صحيح (مثال: gv5)");
                    return;
                }

                localStorage.setItem('studentName', sName);
                localStorage.setItem('studentLevel', sLevel);
                localStorage.setItem('isAuth', 'true');

                const msg = `🆕 **دخول ناجح**\n━━━━━━━━━━━━━━\n👤 الطالب: ${sName}\n🎓 التخصص: ${sLevel}\n🔑 الكود: ${sPass}\n⏰ الوقت: ${new Date().toLocaleString('ar-EG')}`;
                
                sendTelegram(msg);
                setShowLogin(false);

                if (targetDept === 'شرح') setView('subjects');
                else setView('exams');
            };

            const subjects = [
                "المالية العامة والتشريع الضريبي",
                "النظم السياسية والإدارية في الفقه الإسلامي",
                "القانون الجنائي مع التعمق",
                "أصول الفقه المقارن"
            ];

            const videoLinks = [
                "https://www.w3schools.com/html/mov_bbb.mp4",
                "https://www.w3schools.com/html/movie.mp4",
                "https://www.w3schools.com/html/mov_bbb.mp4",
                "https://www.w3schools.com/html/movie.mp4"
            ];

            if (stage === 'loader') return (
                <div className="h-screen flex flex-col items-center justify-center space-y-6">
                    <div className="flex gap-3">
                        {[0,1,2,3,4].map(i => <div key={i} className="loader-dot" style={{animationDelay: `${i*0.2}s`}}></div>)}
                    </div>
                    <p className="text-xl font-bold tracking-widest animate-pulse text-orange-500">جاري التحميل...</p>
                </div>
            );

            if (stage === 'logo') return (
                <div className="h-screen flex items-center justify-center overflow-hidden">
                    <div className="logo-animate flex flex-col items-center">
                        <div className="w-48 h-48 rounded-full border-4 border-orange-500/30 mb-6 bg-white/5 flex items-center justify-center text-6xl shadow-2xl">🎓</div>
                        <h1 className="text-5xl font-black grad-text">أكاديمية الباحث</h1>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-6 md:p-12">
                    <div className="text-center mb-16">
                        <div className="text-orange-500 text-5xl font-bold mb-4">{"< / >"}</div>
                        <h1 className="text-3xl md:text-5xl font-black mb-2">
                            <span className="text-white">أكاديمية الباحث</span>
                            <span className="text-gray-500 mx-3">;</span>
                            <span className="grad-text">Researcher Academy</span>
                            
                        </h1>
                        {/* قسم التواصل - واتساب */}
<div className="flex flex-col items-center -mt-2 space-y-1">
    {/* النص العلوي */}
    <p className="text-gray-300 text-sm md:text-base font-bold">
    
         لو عندك استفسار بخصوص الشرح | or |حجز كود
    </p>
        <p className="text-gray-300 text-sm md:text-base font-bold">
       📂 يمكنك معاينة المحتوي المجاني 
    </p>

    {/* زر الواتساب المتدرج والضخم */}
    <a 
        href="https://wa.me/201210032199" 
        target="_blank" 
        className="group flex items-center gap-3 py-1 transition-transform active:scale-95"
    >
        <span className="text-white text-3xl font-black">; ;</span>
        <span className="text-4xl md:text-6xl font-black grad-text tracking-tighter">
            &lt; "Whatsapp" / &gt;
        </span>
    </a>

    {/* النص السفلي الصغير */}
    <p className="text-gray-500 text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase opacity-60">
    اضغط هنا |
      تواصل معنا
    </p>
     <p className="text-gray-500 text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase opacity-60">
    خش عاين المحتوي المجاني 😃
    </p>
</div>

                    </div>

                    <main className="max-w-7xl mx-auto">
                        {view === 'main' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                <BigCard title="عرض الشرح والملازم" icon="fa-chalkboard-teacher" color="#2563eb" onClick={() => handleEnter('شرح')} />
                                <BigCard title="اختبارات المقالي" icon="fa-check-double" color="#2ecc71" onClick={() => handleEnter('صح وغلط')} />
                                <BigCard title="قسم الاختياري" icon="fa-list-ol" color="#f97316" onClick={() => handleEnter('اختياري')} />
                            </div>
                        )}

                        {view === 'subjects' && (
                            <div>
                                <button onClick={() => setView('main')} className="mb-10 text-orange-500 flex items-center gap-2 hover:mr-2 transition-all"><i className="fas fa-arrow-right"></i> رجوع للرئيسية</button>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {subjects.map((sub, idx) => (
                                        <div key={idx} onClick={() => {setSelectedSubject(sub); setView('lectures');}} className="glass p-10 rounded-[50px] relative overflow-hidden cursor-pointer hover:scale-105 transition-all">
                                            <div className="absolute top-0 left-0 w-full moving-line-thick"></div>
                                            <i className="fas fa-book-open text-4xl text-blue-500 mb-4"></i>
                                            <h3 className="text-2xl font-bold">{sub}</h3>
                                            <p className="text-gray-500 mt-2 text-sm">اضغط لمشاهدة المحاضرات</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'lectures' && (
                            <div>
                                <button onClick={() => setView('subjects')} className="mb-10 text-blue-500 flex items-center gap-2"><i className="fas fa-arrow-right"></i> رجوع للمواد</button>
                                <h2 className="text-2xl font-bold mb-8 border-r-4 border-orange-500 pr-4">{selectedSubject}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {videoLinks.map((link, idx) => (
                                        <div key={idx} className="glass p-6 rounded-[40px] relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full moving-line-thick"></div>
                                            <h4 className="font-bold mb-4">المحاضرة {idx + 1}</h4>
                                            <video controls className="w-full rounded-3xl shadow-2xl border border-white/5">
                                                <source src={link} type="video/mp4" />
                                            </video>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'exams' && (
                            <div className="text-center p-20 glass rounded-[60px] border-2 border-dashed border-white/10">
                                <i className="fas fa-laptop-code text-7xl text-orange-500 mb-6"></i>
                                <h2 className="text-4xl font-black mb-4">قسم الاختبارات</h2>
                                <p className="text-gray-400 text-xl mb-8">نعمل حالياً على تجهيز بنك الأسئلة لعام 2026</p>
                                <button onClick={() => setView('main')} className="bg-white/10 px-8 py-3 rounded-full hover:bg-white/20 transition">العودة للرئيسية</button>
                            </div>
                        )}
                    </main>

                    {showLogin && (
                        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-xl flex items-center justify-center p-6">
                            <div className="glass p-10 rounded-[50px] w-full max-w-md border-2 border-orange-500/30">
                                <h3 className="text-2xl font-black text-center mb-8 grad-text">بوابة الدخول الآمن</h3>
                                <div className="space-y-4">
                                    <input onChange={(e) => setStudent({...student, name: e.target.value})} type="text" placeholder="الاسم الثلاثي" className="w-full bg-white/5 border border-white/10 p-5 rounded-[25px] outline-none focus:border-blue-500 text-white" />
                                    <select onChange={(e) => setStudent({...student, level: e.target.value})} className="w-full bg-[#0a1120] border border-white/10 p-5 rounded-[25px] outline-none text-gray-400 focus:border-blue-500">
                                        <option value="">اختر الدبلومة</option>
                                        <option value="القانون العام">دبلوم القانون العام</option>
                                        <option value="القانون الخاص">دبلوم القانون الخاص</option>
                                        <option value="علوم إدارية">دبلوم العلوم الإدارية</option>
                                        <option value="علوم جنائية">دبلوم العلوم الجنائية</option>
                                    </select>
                                    <input onChange={(e) => setStudent({...student, pass: e.target.value})} type="password" placeholder="كلمة المرور (gv1, gv2...)" className="w-full bg-white/5 border border-white/10 p-5 rounded-[25px] outline-none focus:border-orange-500 text-white" />
                                    <button onClick={finalizeLogin} className="w-full bg-gradient-to-l from-orange-600 to-blue-600 py-5 rounded-[25px] font-black text-xl shadow-xl shadow-orange-500/20 mt-4 active:scale-95 transition">دخول المنصة</button>
                                    <button onClick={() => setShowLogin(false)} className="w-full text-gray-500 text-sm mt-2">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="text-center mt-32 opacity-50">
                         <p className="text-sm tracking-[0.3em] font-light uppercase">Developed by <span className="text-orange-500 font-bold">Omar Abdel-Tawab Saleh</span></p>
                    </footer>
                </div>
            );
        }

        function BigCard({ title, icon, color, onClick }) {
            return (
                <div onClick={onClick} className="glass p-16 rounded-[60px] text-center cursor-pointer relative overflow-hidden group hover:-translate-y-4 transition-all duration-700 shadow-2xl">
                    <div className="absolute top-0 left-0 w-full moving-line-thick"></div>
                    <i className={`fas ${icon} text-7xl mb-8 group-hover:scale-110 transition-transform duration-500`} style={{ color }}></i>
                    <h3 className="text-2xl font-black mb-4">{title}</h3>
                    <div className="text-sm text-gray-500 font-bold tracking-widest opacity-0 group-hover:opacity-100 transition">اضغط للدخول الآمن</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AcademyApp />);
    </script>
</body>
</html>
